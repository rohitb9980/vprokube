apVersion: v1
kind: Deployment
metadata:
  name: vprodb
  labels:
    app: vprodb
spec:
  replicas: 1
  selector:
   matchlabels:
    app: vprodb
  template:
   metadata:
    labels:
     app: vprodb
  spec:
   containers:
   - name: vprodb
     image: vprocontainers/vprofiledb
     volumeMounts:
     - mountPath: /var/lib/mysql
       name: vpro-db-data
     ports:
     - name: vprodb-port
       containerPort: 3306
     env:
      - name: MYSQL_ROOT_PASSWORD:
        valueFrom:
          decretKeyRef:
            name: app-secret
            key: db-pass
   volumes:
     - name: vpro-db-data
       persistentVolumeClaim:
        claimName: db-pvc-claim
   initContainers:
   - name: busybox
      image: busybox:latest
      args: ["rm", "-rf", "/var/lib/mysql/lost+found"]
      volumeMounts:
      - mountPath: /var/lib/mysql
        name: vpro-db-data