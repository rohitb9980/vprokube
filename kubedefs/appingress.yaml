apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vpro-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: kube8.devopswithrohit.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vproapp-service  # Ensure this matches your fixed SVC name
            port:
              number: 8080         # The port your app container uses
