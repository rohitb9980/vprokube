apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpromc
  labels:
    app: vpromc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpromc
  template:
    metadata:
      labels:
        app: vpromc
    spec:            # This must align vertically with 'metadata' above
      containers:
      - name: memcached
        image: memcached:latest
        ports:
        - name: vpromc-port
          containerPort: 11211
